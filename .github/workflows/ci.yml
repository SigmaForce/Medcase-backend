name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
  JWT_SECRET: ci-test-secret-minimum-32-characters-long
  JWT_REFRESH_SECRET: ci-test-refresh-minimum-32-chars-x
  JWT_ACCESS_EXPIRES_IN: 1h
  JWT_REFRESH_EXPIRES_IN: 7d
  RESEND_API_KEY: dummy
  RESEND_FROM_EMAIL: ci@example.com
  APP_URL: http://localhost:3000
  OPENAI_API_KEY: dummy

jobs:
  setup:
    name: Install & Generate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Cache node_modules + Prisma client
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules + Prisma client
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}
          fail-on-cache-miss: true

      - name: Typecheck
        run: pnpm exec tsc --noEmit -p tsconfig.build.json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules + Prisma client
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}
          fail-on-cache-miss: true

      - name: Run tests with coverage
        run: pnpm test:cov --ci --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Restore node_modules + Prisma client
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}
          fail-on-cache-miss: true

      - name: Build
        run: pnpm build
