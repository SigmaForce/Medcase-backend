name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
  JWT_SECRET: ci-test-secret-minimum-32-characters-long
  JWT_REFRESH_SECRET: ci-test-refresh-minimum-32-chars-x
  JWT_ACCESS_EXPIRES_IN: 1h
  JWT_REFRESH_EXPIRES_IN: 7d
  RESEND_API_KEY: dummy
  RESEND_FROM_EMAIL: ci@example.com
  APP_URL: http://localhost:3000
  OPENAI_API_KEY: dummy
  STRIPE_SECRET_KEY: dummy-stripe-secret
  STRIPE_WEBHOOK_SECRET: dummy-stripe-webhook
  STRIPE_PRICE_ID_PRO: price_dummy
  MP_ACCESS_TOKEN: dummy-mp-token
  MP_WEBHOOK_SECRET: dummy-mp-webhook
  POSTHOG_API_KEY: phc_dummy
  ADMIN_EMAIL: admin@example.com

jobs:
  setup:
    name: Install & Generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm prisma:generate

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}

  typecheck:
    name: Typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}
          fail-on-cache-miss: true

      - run: pnpm exec tsc --noEmit -p tsconfig.build.json

  test:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}
          fail-on-cache-miss: true

      - run: pnpm test:cov --ci --forceExit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            .prisma
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('prisma/schema.prisma') }}
          fail-on-cache-miss: true

      - run: pnpm build
